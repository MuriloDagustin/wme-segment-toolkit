name: release-please

# Single-workflow release pipeline:
# 1. release-please runs on every push to main and maintains a Release PR
#    that bumps the version + updates CHANGELOG.md based on Conventional
#    Commits.
# 2. Merging that PR causes release-please to create a GitHub Release; the
#    same workflow then builds the userscript with the new version baked in
#    and uploads `.user.js` + `.meta.js` as release assets so the
#    `releases/latest/download/...` URLs resolve to the freshly built files.
#
# Everything happens in one workflow on purpose: releases created with the
# default GITHUB_TOKEN do not trigger downstream `release: published`
# workflows, which would otherwise require a PAT.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-upload:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test --silent

      - run: npm run build

      - name: Upload userscript artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/wme-segment-toolkit.user.js \
            dist/wme-segment-toolkit.meta.js \
            --clobber
